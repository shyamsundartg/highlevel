<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genesis Preview</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: Inter, system-ui, sans-serif;
        background: #0f1117;
        color: #e8ecf4;
      }
      #genesis-host {
        height: 100%;
        min-height: 100%;
      }
      .error {
        color: #ef6b6b;
        padding: 0.75rem;
        margin: 1rem;
        border: 1px solid #ef6b6b;
        border-radius: 8px;
      }
      .empty {
        color: #9aa3b8;
        font-size: 0.875rem;
        padding: 1rem;
      }
      .preview-frame {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="genesis-host">
      <p class="empty">Waiting for preview data…</p>
    </div>
    <script>
      const host = document.getElementById("genesis-host");

      let bridgeToken = "";
      let bridgeApiBase = "";
      const pendingTokenResolvers = [];
      const hlEventListeners = [];

      function dispatchHlEvent(event) {
        for (const callback of hlEventListeners) {
          try {
            callback(event);
          } catch (err) {
            console.error("genesis onHlEvent callback failed", err);
          }
        }
      }

      function requestTokenFromParent() {
        return new Promise((resolve, reject) => {
          const timeout = setTimeout(() => {
            reject(new Error("Sign in to Genesis to preview HighLevel data"));
          }, 10000);
          pendingTokenResolvers.push((token) => {
            clearTimeout(timeout);
            resolve(token);
          });
          window.parent.postMessage(
            { type: "genesis-preview-need-token" },
            window.location.origin,
          );
        });
      }

      function contactId(contact) {
        if (!contact || typeof contact !== "object") return "";
        return String(contact.id || contact.contactId || "");
      }

      function contactName(contact) {
        if (!contact || typeof contact !== "object") return "Unknown";
        if (typeof contact.name === "string" && contact.name.trim()) {
          return contact.name.trim();
        }
        const parts = [contact.firstName, contact.lastName]
          .filter((v) => typeof v === "string" && v.trim())
          .map((v) => v.trim());
        if (parts.length) return parts.join(" ");
        if (typeof contact.email === "string" && contact.email.trim()) {
          return contact.email.trim();
        }
        if (typeof contact.phone === "string" && contact.phone.trim()) {
          return contact.phone.trim();
        }
        return "Unknown";
      }

      /** Prepend new contact or replace existing by id — avoids stale GET list after webhooks. */
      function upsertContact(list, contact) {
        const items = Array.isArray(list) ? [...list] : [];
        const id = contactId(contact);
        if (!id) {
          items.unshift(contact);
          return items;
        }
        const index = items.findIndex((c) => contactId(c) === id);
        if (index >= 0) {
          items[index] = { ...items[index], ...contact };
          const [updated] = items.splice(index, 1);
          items.unshift(updated);
        } else {
          items.unshift(contact);
        }
        return items;
      }

      function setupGenesisBridge(apiBase, token) {
        bridgeApiBase = apiBase || "";
        if (token) {
          bridgeToken = token;
        }

        // Returns parsed JSON (throws on error) so generated preview code can use it directly.
        window.__GENESIS__ = {
          apiBase: bridgeApiBase,
          async getIdToken(forceRefresh) {
            if (!forceRefresh && bridgeToken) {
              return bridgeToken;
            }
            bridgeToken = await requestTokenFromParent();
            return bridgeToken;
          },
          async fetch(path, options) {
            const authToken = await window.__GENESIS__.getIdToken();
            const base = window.__GENESIS__.apiBase;
            const opts = options || {};
            const headers = new Headers(opts.headers || {});
            headers.set("Authorization", `Bearer ${authToken}`);

            let url = path.startsWith("http")
              ? path
              : `${base}${path.startsWith("/") ? path : `/${path}`}`;

            if (opts.params && typeof opts.params === "object") {
              const parsed = new URL(url);
              for (const [key, value] of Object.entries(opts.params)) {
                if (value !== undefined && value !== null && value !== "") {
                  parsed.searchParams.set(key, String(value));
                }
              }
              url = parsed.toString();
            }

            let body = opts.body;
            if (
              body !== undefined &&
              body !== null &&
              typeof body === "object" &&
              !(body instanceof FormData) &&
              !(body instanceof Blob)
            ) {
              headers.set("Content-Type", "application/json");
              body = JSON.stringify(body);
            }

            const res = await fetch(url, { ...opts, headers, body });
            const text = await res.text();
            let data = null;
            if (text) {
              try {
                data = JSON.parse(text);
              } catch {
                data = { raw: text };
              }
            }
            if (!res.ok) {
              const message =
                data && typeof data === "object" && typeof data.message === "string"
                  ? data.message
                  : `Request failed: ${res.status}`;
              throw new Error(message);
            }
            return data;
          },
          onHlEvent(callback) {
            if (typeof callback !== "function") {
              throw new Error("onHlEvent requires a function");
            }
            hlEventListeners.push(callback);
            return () => {
              const index = hlEventListeners.indexOf(callback);
              if (index >= 0) {
                hlEventListeners.splice(index, 1);
              }
            };
          },
          contactId,
          contactName,
          upsertContact,
        };
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderError(message) {
        host.textContent = "";
        const el = document.createElement("div");
        el.className = "error";
        el.textContent = message;
        host.appendChild(el);
      }

      /**
       * Run preview.html as a full document in a same-origin iframe.
       * Injecting a full HTML doc into a div breaks Vue: external <script src>
       * tags are dropped, and .mount('#app') hits this host page's #app.
       */
      function renderCustomPreview(html) {
        const bridgeTag =
          "<script>window.__GENESIS__=window.parent.__GENESIS__;<\/script>";

        let srcdoc = html;
        if (/<head[^>]*>/i.test(srcdoc)) {
          srcdoc = srcdoc.replace(/<head[^>]*>/i, (match) => `${match}\n${bridgeTag}`);
        } else if (/<html[^>]*>/i.test(srcdoc)) {
          srcdoc = srcdoc.replace(/<html[^>]*>/i, (match) => `${match}\n<head>${bridgeTag}</head>`);
        } else {
          srcdoc = `${bridgeTag}\n${srcdoc}`;
        }

        host.innerHTML = "";
        const iframe = document.createElement("iframe");
        iframe.className = "preview-frame";
        iframe.title = "Generated app preview";
        iframe.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms");
        iframe.srcdoc = srcdoc;
        host.appendChild(iframe);
      }

      window.addEventListener("message", async (event) => {
        if (event.origin !== window.location.origin) return;

        const { type, apiBase, token, files } = event.data || {};

        if (type === "genesis-preview-token") {
          if (typeof token === "string" && token) {
            bridgeToken = token;
            const resolvers = pendingTokenResolvers.splice(0);
            resolvers.forEach((resolve) => resolve(token));
          }
          return;
        }

        if (type === "genesis-hl-event") {
          const hlEvent = event.data?.event;
          if (hlEvent && typeof hlEvent === "object") {
            dispatchHlEvent(hlEvent);
          }
          return;
        }

        if (type !== "genesis-preview-init") return;

        hlEventListeners.length = 0;

        try {
          const filePaths = Object.keys(files || {});
          if (filePaths.length === 0) {
            host.innerHTML =
              "<p class='empty'>Generate an app via chat to see the live preview here.</p>";
            return;
          }

          if (!files?.["preview.html"]) {
            host.innerHTML =
              "<p class='empty'>No preview.html yet. Ask the AI to generate a preview.html dashboard with real HighLevel data.</p>";
            return;
          }

          if (!apiBase || !token) {
            renderError("Sign in to Genesis to preview HighLevel data");
            return;
          }

          setupGenesisBridge(apiBase, token);
          renderCustomPreview(files["preview.html"]);
        } catch (err) {
          renderError(err?.message || "Failed to load preview");
        }
      });

      window.parent.postMessage({ type: "genesis-preview-ready" }, window.location.origin);
    </script>
  </body>
</html>
